schema_version: "mockup-layout-plan/v2"
layout_contract:
  ui_stack: "UGUI"
  mode: "build"
  mockup_source: "attached reward-card mockup"
  target_resolution: "1920x1080"
  root_owner: "Canvas/SafeAreaRoot/RewardPopupRoot"
  structure_rule: "parent ownership before leaf sizing"
  candidate_policy:
    accepted: "must have item_rect_plan and referenced asset_plan entries"
    held: "remain review notes and must not create runtime nodes or assets"
    rejected: "must not create runtime nodes or assets"
stack_realization:
  target_surface: "runtime"
  reusable_asset_type: "prefab"
  ugui:
    canvas_root: "Canvas/SafeAreaRoot"
    reference_resolution: "1920x1080"
layout_tree:
  - node_path: "Canvas/SafeAreaRoot/RewardPopupRoot"
    role: "region"
    parent_owner: "Canvas/SafeAreaRoot"
    node_kind: "RectTransform container"
    layout_owner: "manual modal bounds"
    placement_intent: "centered modal"
    geometry_ratios: {x: 0.275, y: 0.16, width: 0.45, height: 0.68}
    split_keep_reason: "modal owns reward composition"
  - node_path: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    role: "reusable group"
    parent_owner: "Canvas/SafeAreaRoot/RewardPopupRoot"
    node_kind: "prefab root"
    layout_owner: "VerticalLayoutGroup"
    placement_intent: "centered parent-flow child"
    geometry_ratios: {x: 0.335, y: 0.25, width: 0.33, height: 0.44}
    split_keep_reason: "reward card repeats across reward screens"
  - node_path: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard/Icon"
    role: "runtime leaf"
    parent_owner: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    node_kind: "Image"
    layout_owner: "LayoutElement"
    placement_intent: "centered preserve-aspect child"
    geometry_ratios: {x: 0.455, y: 0.34, width: 0.09, height: 0.16}
    split_keep_reason: "dynamic reward icon"
candidate_item_ledger:
  - candidate_id: "candidate/RewardCard/Icon"
    source_bounds: {x: 874, y: 367, width: 172, height: 172}
    confidence_band: "high"
    evidence: ["centered icon cluster", "dynamic reward content"]
    suggested_role: "icon"
    parent_hint: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    crop_padding: "12px glow remains outside icon sprite"
    nine_slice_candidate: false
    review_decision: "accept"
    decision_note: "runtime sprite swap requires a distinct image"
  - candidate_id: "candidate/RewardCard/OuterGlow"
    source_bounds: {x: 620, y: 245, width: 680, height: 560}
    confidence_band: "medium"
    evidence: ["soft panel shadow"]
    suggested_role: "hold-for-review"
    parent_hint: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    crop_padding: "unknown"
    nine_slice_candidate: false
    review_decision: "hold"
    decision_note: "may be baked into the card background"
  - candidate_id: "candidate/RewardCard/InnerHighlightLine"
    source_bounds: {x: 674, y: 308, width: 572, height: 3}
    confidence_band: "medium"
    evidence: ["decorative separator"]
    suggested_role: "baked decoration"
    parent_hint: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    crop_padding: "none"
    nine_slice_candidate: false
    review_decision: "reject"
    decision_note: "keep inside card background art"
item_rect_plan:
  - item_id: "RewardCard/Icon"
    candidate_id: "candidate/RewardCard/Icon"
    node_path: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard/Icon"
    source_rect: {x: 874, y: 367, width: 172, height: 172}
    normalized_rect: {x: 0.4552, y: 0.3398, width: 0.0896, height: 0.1593}
    parent_local_rect: {x: 0, y: -24, width: 172, height: 172}
    fit_mode: "preserve-aspect"
    placement_intent: "centered VerticalLayoutGroup child"
    split_keep_reason: "dynamic reward icon"
    asset_plan_id: "asset/RewardCard/Icon"
asset_plan:
  - asset_plan_id: "asset/RewardCard/Icon"
    item_id: "RewardCard/Icon"
    candidate_id: "candidate/RewardCard/Icon"
    plan: "reuse reward icon sprite or import a provisional crop"
    source: "existing sprite preferred"
    nine_slice: false
    creates_runtime_node: true
behavior_plan:
  - behavior_id: "behavior/RewardCard/BindReward"
    owner: "Canvas/SafeAreaRoot/RewardPopupRoot/RewardCard"
    intent: "bind reward sprite and amount to the prefab instance"
verification_targets:
  - target: "prefab instance screenshot"
    resolution: "1920x1080"
    checks: ["RewardCard owns icon placement", "held and rejected candidates create no nodes or assets"]
  - target: "alternate aspect screenshot"
    resolution: "1600x900"
    checks: ["RewardPopupRoot remains centered", "VerticalLayoutGroup owns card spacing"]
