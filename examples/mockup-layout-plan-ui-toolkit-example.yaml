schema_version: "mockup-layout-plan/v2"
layout_contract:
  ui_stack: "UI Toolkit"
  mode: "build"
  mockup_source: "attached quest-list mockup"
  target_resolution: "1920x1080"
  root_owner: "QuestScreen"
  structure_rule: "flex owner before leaf sizing"
  candidate_policy:
    accepted: "must have item_rect_plan and referenced asset_plan entries"
    held: "remain review notes and must not create runtime nodes or assets"
    rejected: "must not create runtime nodes or assets"
stack_realization:
  target_surface: "runtime"
  reusable_asset_type: "uxml-template"
  ui_toolkit:
    root_uxml: "Assets/UI/Quest/QuestScreen.uxml"
    stylesheets:
      - "Assets/UI/Quest/QuestScreen.uss"
      - "Assets/UI/Shared/Tokens.uss"
    behavior_owner: "QuestScreenController"
    panel_settings: "Assets/UI/PanelSettings.asset"
layout_tree:
  - node_path: "QuestScreen"
    role: "screen root"
    parent_owner: "UIDocument"
    node_kind: "VisualElement"
    layout_owner: ".quest-screen flex owner"
    placement_intent: "fill panel with column flow"
    geometry_ratios: {x: 0.0, y: 0.0, width: 1.0, height: 1.0}
    split_keep_reason: "screen owns responsive composition"
  - node_path: "QuestScreen/QuestList"
    role: "repeated group"
    parent_owner: "QuestScreen"
    node_kind: "VisualElement"
    layout_owner: ".quest-list flex owner"
    placement_intent: "grow within screen column"
    geometry_ratios: {x: 0.1, y: 0.18, width: 0.8, height: 0.68}
    split_keep_reason: "list owns repeated quest rows"
  - node_path: "QuestScreen/QuestList/QuestRow"
    role: "reusable item"
    parent_owner: "QuestScreen/QuestList"
    node_kind: "TemplateContainer from VisualTreeAsset"
    layout_owner: ".quest-row flex owner"
    placement_intent: "row flow with icon and text content"
    geometry_ratios: {x: 0.1, y: 0.2, width: 0.8, height: 0.12}
    split_keep_reason: "runtime quest data repeats"
candidate_item_ledger:
  - candidate_id: "candidate/QuestRow/Icon"
    source_bounds: {x: 230, y: 250, width: 96, height: 96}
    confidence_band: "high"
    evidence: ["repeated icon slot", "runtime quest category"]
    suggested_role: "quest icon"
    parent_hint: "QuestScreen/QuestList/QuestRow"
    crop_padding: "4px transparent edge"
    nine_slice_candidate: false
    review_decision: "accept"
    decision_note: "runtime icon changes per quest"
  - candidate_id: "candidate/QuestList/BackdropGlow"
    source_bounds: {x: 160, y: 170, width: 1600, height: 760}
    confidence_band: "low"
    evidence: ["soft backdrop boundary"]
    suggested_role: "hold-for-review"
    parent_hint: "QuestScreen/QuestList"
    crop_padding: "unknown"
    nine_slice_candidate: false
    review_decision: "hold"
    decision_note: "may be a USS background effect"
  - candidate_id: "candidate/QuestRow/Hairline"
    source_bounds: {x: 210, y: 365, width: 1500, height: 1}
    confidence_band: "medium"
    evidence: ["decorative separator"]
    suggested_role: "USS border"
    parent_hint: "QuestScreen/QuestList/QuestRow"
    crop_padding: "none"
    nine_slice_candidate: false
    review_decision: "reject"
    decision_note: "render with the quest-row USS class"
item_rect_plan:
  - item_id: "QuestRow/Icon"
    candidate_id: "candidate/QuestRow/Icon"
    node_path: "QuestScreen/QuestList/QuestRow"
    source_rect: {x: 230, y: 250, width: 96, height: 96}
    normalized_rect: {x: 0.1198, y: 0.2315, width: 0.05, height: 0.0889}
    parent_local_rect: {x: 20, y: 12, width: 96, height: 96}
    fit_mode: "flex-none preserve-aspect"
    placement_intent: "first child in quest-row flex flow"
    split_keep_reason: "runtime quest category icon"
    asset_plan_id: "asset/QuestRow/Icon"
asset_plan:
  - asset_plan_id: "asset/QuestRow/Icon"
    item_id: "QuestRow/Icon"
    candidate_id: "candidate/QuestRow/Icon"
    plan: "bind an existing Texture2D to the template icon element"
    source: "existing quest icon catalog"
    nine_slice: false
    creates_runtime_node: true
behavior_plan:
  - behavior_id: "behavior/QuestList/CloneRows"
    owner: "QuestScreenController"
    intent: "clone QuestRow.uxml VisualTreeAsset and bind quest data"
    reusable_template: "Assets/UI/Quest/QuestRow.uxml"
    uss_classes: ["quest-list", "quest-row", "quest-row__icon"]
verification_targets:
  - target: "main panel screenshot"
    resolution: "1920x1080"
    checks: ["QuestRow UXML template is reused", "quest-list and quest-row flex owners control layout", "only accepted candidates create runtime nodes and assets"]
  - target: "alternate panel screenshot"
    resolution: "1366x768"
    checks: ["quest list remains inside panel", "row text and icon remain in flex flow"]
