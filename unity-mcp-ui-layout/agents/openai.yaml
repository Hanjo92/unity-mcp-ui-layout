interface:
  display_name: "Unity MCP UI Layout"
  short_description: "Unity UI snapshot, layer/tree, candidate-ledger, and item-rect layout via MCP."
  default_prompt: "Use $unity-mcp-ui-layout to repair or build Unity UI through staged, layout-focused edits. Trigger it for attached UI mockups, mockup screenshots, uploaded design images, dropped design images, reference images, UI 시안, 시안 던져줄게, and requests to turn, convert, make, generate, or create Unity UI prefabs or 프리팹 from a design. Before using prefab or Canvas defaults, route explicit UI Toolkit requests and UI Toolkit-owned selected targets (UIDocument, UXML/USS, VisualElement, or PanelSettings) to UI Toolkit. For existing Unity UI, capture a layout snapshot or equivalent smaller-call evidence first: active UI root, UI stack, target surface, Unity version evidence, root layout owners, screenshot frame, and console state. For designs, run a layer-to-Transform tree pass first: identify 레이어 구조, 트리 구조, parent-owned regions, reusable groups, runtime leaves, decorative image layers, candidate item ledger entries, and item-level UI rect plans before creating objects. Read design tokens before styling, and verify with screenshots."
